name: Scrape availability

# Refreshes public/data from the providers' official supported-country pages and
# commits any changes. The commit (and its diff) is the audit trail; pushing to
# main triggers a Vercel redeploy via the git integration.
on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch + parse only, write/commit nothing (validation)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Scrape
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run scrape:dry
          else
            npm run scrape
          fi
      - name: Commit refreshed data (only if changed)
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "availability-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/availability.json public/data/changelog.json public/data/features.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh availability ($(date -u +%Y-%m-%d))"
            git push
          fi
