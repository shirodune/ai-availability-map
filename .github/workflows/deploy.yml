name: Deploy

# Builds the static site and publishes it to GitHub Pages. Runs on code pushes,
# manually, and after the scraper commits fresh data (workflow_run).
on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Scrape availability"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # Project Pages serve from /<repo>/. For a user/org site or a custom
          # domain served at the root, set VITE_BASE to "/".
          VITE_BASE: "/${{ github.event.repository.name }}/"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
